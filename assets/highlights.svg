      <animate attributeName="stroke-opacity" values="0.35;0.9;0.35" dur="3.4s" begin="2.75s" repeatCount="indefinite"/>
    </rect>
    <rect x="589" y="108" width="270" height="72" rx="14" fill="none" stroke="#b400ff" stroke-opacity="0.85" stroke-width="1.2"/>
    <text x="724" y="150" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="700" fill="#ffffff">🔬 Deep Research</text>
