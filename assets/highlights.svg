<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 200" width="880" height="200" role="img" aria-label="Highlights">
  <defs>
    <linearGradient id="hlNeon" x1="0" y1="0" x2="1" y2="0" spreadMethod="reflect">
      <stop offset="0" stop-color="#00f0ff"/>
      <stop offset="0.5" stop-color="#b400ff"/>
      <stop offset="1" stop-color="#ff00e5"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        values="0 0; 1 0; 0 0" dur="10s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="hlGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
  </defs>

  <!-- Panel -->
  <rect x="6" y="8" width="868" height="184" rx="18"
        fill="#0a0118" stroke="url(#hlNeon)" stroke-opacity="0.55" stroke-width="1.8"/>

  <!-- Tile-Vorlage: Glow-Rahmen (gestaffelt pulsierend) + scharfer Rahmen + Label -->
  <!-- Reihe 1 -->
  <g>
    <rect x="21" y="20" width="270" height="72" rx="14" fill="#140a24"/>
    <rect x="21" y="20" width="270" height="72" rx="14" fill="none" stroke="#ff00e5" stroke-width="2" filter="url(#hlGlow)" stroke-opacity="0.9">
      <animate attributeName="stroke-opacity" values="0.35;0.9;0.35" dur="3.4s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <rect x="21" y="20" width="270" height="72" rx="14" fill="none" stroke="#ff00e5" stroke-opacity="0.85" stroke-width="1.2"/>
    <text x="156" y="62" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="700" fill="#ffffff">🤖 Multi-Agent KI</text>
  </g>
  <g>
    <rect x="305" y="20" width="270" height="72" rx="14" fill="#140a24"/>
