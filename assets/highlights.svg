      <animate attributeName="stroke-opacity" values="0.35;0.9;0.35" dur="3.4s" begin="0.55s" repeatCount="indefinite"/>
    </rect>
    <rect x="305" y="20" width="270" height="72" rx="14" fill="none" stroke="#b400ff" stroke-opacity="0.85" stroke-width="1.2"/>
    <text x="440" y="62" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="700" fill="#ffffff">📨 Telegram-Bots</text>
  </g>
  <g>
