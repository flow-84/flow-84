    </rect>
    <rect x="589" y="20" width="270" height="72" rx="14" fill="none" stroke="#00f0ff" stroke-opacity="0.85" stroke-width="1.2"/>
    <text x="724" y="62" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="700" fill="#ffffff">🔗 Slack·Trello·ClickUp</text>
  </g>

  <!-- Reihe 2 -->
  <g>
    <rect x="21" y="108" width="270" height="72" rx="14" fill="#140a24"/>
