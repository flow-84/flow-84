<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 220" width="880" height="220" role="img" aria-label="MULTIVERSEMEDIA">
  <defs>
    <!-- Neon-Verlauf, fliesst langsam horizontal -->
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0" spreadMethod="reflect">
      <stop offset="0" stop-color="#00f0ff"/>
      <stop offset="0.5" stop-color="#b400ff"/>
      <stop offset="1" stop-color="#ff00e5"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        values="0 0; 1 0; 0 0" dur="9s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff00e5" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#b400ff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#00f0ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-60%" width="160%" height="260%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="panelGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- dunkles Panel, damit Neon auf jedem Theme lesbar bleibt -->
  <rect x="6" y="10" width="868" height="200" rx="20"
        fill="#0a0118" stroke="#b400ff" stroke-opacity="0.45" stroke-width="1.5"/>
  <rect x="6" y="10" width="868" height="200" rx="20" fill="none"
        stroke="#00f0ff" stroke-opacity="0.25" stroke-width="3" filter="url(#panelGlow)"/>

  <!-- Wortmarke: weicher pulsierender Glow dahinter -->
  <text x="440" y="108" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="58" font-weight="800" letter-spacing="4"
        fill="url(#neon)" filter="url(#soft)">MULTIVERSEMEDIA
    <animate attributeName="opacity" values="0.35;0.85;0.35" dur="3.8s" repeatCount="indefinite"/>
  </text>

  <!-- Wortmarke: scharfe Ebene -->
  <text x="440" y="108" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="58" font-weight="800" letter-spacing="4"
        fill="url(#neon)">MULTIVERSEMEDIA</text>

  <!-- Untertitel -->
  <text x="440" y="150" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="18" letter-spacing="3"
        fill="#00f0ff" fill-opacity="0.92">fl0w &#160;·&#160; DevOps &amp; Cloud Architecture</text>

  <!-- Neon-Unterlinie mit wanderndem Lichtpunkt -->
  <rect x="240" y="172" width="400" height="2.5" rx="1.25" fill="url(#line)"/>
  <circle cx="240" cy="173" r="4" fill="#ffffff" filter="url(#panelGlow)">
    <animate attributeName="cx" values="250;630;250" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="fill" values="#00f0ff;#ff00e5;#00f0ff" dur="6s" repeatCount="indefinite"/>
  </circle>
</svg>
