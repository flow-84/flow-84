name: Trophies
on:
  schedule: [{cron: "30 5 * * *"}]
  workflow_dispatch:
  push: {branches: ["main", "master"]}
jobs:
  generate-trophies:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch trophy SVG
        run: |
          set -euo pipefail
          URL="https://github-profile-trophy.vercel.app/?username=${{ github.repository_owner }}&theme=algolia&no-bg=true&no-frame=true&column=7&margin-w=8&margin-h=8"
          curl --fail --show-error --silent --location \
               --retry 4 --retry-delay 5 --retry-all-errors \
               -o assets/trophies.raw.svg "$URL"
          # Validierung: muss ein echtes SVG sein, sonst abbrechen (kein kaputter Commit)
          head -c 200 assets/trophies.raw.svg
          grep -q "<svg" assets/trophies.raw.svg

      - name: Inject neon glow animation
        run: |
          python3 - <<'PY'
          import re, sys
          src = open('assets/trophies.raw.svg', encoding='utf-8').read()
          m = re.search(r'<svg\b[^>]*>', src)
          if not m:
              sys.exit("kein <svg>-Tag gefunden")
          style = (
            '<style>'
            '@keyframes mvGlow{'
            '0%,100%{filter:drop-shadow(0 0 2px #ff00e5) drop-shadow(0 0 4px rgba(180,0,255,.5))}'
            '50%{filter:drop-shadow(0 0 6px #00f0ff) drop-shadow(0 0 12px rgba(0,240,255,.6))}'
            '}'
            'svg{animation:mvGlow 4.5s ease-in-out infinite}'
            '</style>'
          )
          out = src[:m.end()] + style + src[m.end():]
          open('assets/trophies.svg', 'w', encoding='utf-8').write(out)
          print('trophies.svg geschrieben, bytes:', len(out))
          PY
          rm -f assets/trophies.raw.svg

      - name: Commit & push to assets
        uses: actions-js/push@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
          message: "chore: update trophies (neon glow) [skip ci]"
