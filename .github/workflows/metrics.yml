name: Metrics
on:
  schedule: [{cron: "0 6 * * *"}]
  workflow_dispatch:
  push: {branches: ["main", "master"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 3D isometric contribution calendar (full year, private-aware)
      - name: Isocalendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/isocalendar.svg
          base: ""
          template: classic
          config_timezone: Europe/Berlin
          config_animations: yes
          config_padding: 4%
          repositories_affiliations: owner, collaborator, organization_member
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          extras_css: |
            svg, .background, foreignObject > *, body { background: #0a0118 !important; }
            * { color: #00f0ff !important; }
            text, tspan { fill: #00f0ff !important; }
            .title, h2 { fill: #ff00e5 !important; color: #ff00e5 !important; text-shadow: 0 0 6px #ff00e5 !important; }
            .calendar-label { fill: #b400ff !important; }
