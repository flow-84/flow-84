name: Metrics
on:
  schedule: [{cron: "0 6 * * *"}]
  workflow_dispatch:
  push: {branches: ["main", "master"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.svg
          base: header, activity, community, repositories, metadata
          template: terminal
          config_timezone: Europe/Berlin
          config_animations: yes
          config_padding: 6%
          repositories_affiliations: owner, collaborator, organization_member
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_activity: yes
          plugin_activity_limit: 6
          plugin_activity_days: 14
          plugin_activity_visibility: all
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_charts: yes
          plugin_habits_facts: yes
          plugin_lines: yes
          plugin_stars: yes
          plugin_stars_limit: 4
          extras_css: |
            body { background: #05010d !important; }
            .terminal, svg, .container { background: #05010d !important; }
            * { color: #00f0ff !important; }
            h1, h2, .title, .header { color: #ff00e5 !important; text-shadow: 0 0 6px #ff00e5, 0 0 12px #ff00e5 !important; }
            .terminal-header, .terminal-title { color: #00f0ff !important; text-shadow: 0 0 6px #00f0ff !important; }
            text { fill: #00f0ff !important; }
            rect, .calendar-day { stroke: #ff00e5 !important; }
            a, .link { color: #b400ff !important; text-shadow: 0 0 4px #b400ff !important; }
            .field, .value { text-shadow: 0 0 4px #00f0ff !important; }
