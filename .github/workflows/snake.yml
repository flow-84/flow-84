name: Snake Animation
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
  push: {branches: ["main", "master"]}
jobs:
  generate-snake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate snake (neon, light & dark)
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            assets/snake.svg?color_snake=%23ff00e5&color_dots=%23ebe6f5,%23b400ff,%23d400e5,%23ff00e5,%2300f0ff
            assets/snake-dark.svg?palette=github-dark&color_snake=%2300f0ff&color_dots=%232a1a3a,%237a1d8c,%23b400ff,%23ff00e5,%2300f0ff

      - name: Commit & push to assets
        uses: actions-js/push@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
          message: "chore: update snake animation [skip ci]"
